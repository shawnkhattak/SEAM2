services:
  db:
    image: postgis/postgis:16-3.4
    container_name: seam-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seam}
      POSTGRES_DB: ${POSTGRES_DB:-seam}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - seam_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seam} -d ${POSTGRES_DB:-seam}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: seam-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://seam:seam@db:5432/seam}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
    container_name: seam-frontend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  seam_db_data:
